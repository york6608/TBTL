<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uzalendo Hardware &amp; Building Materials | Tanzania</title>
  <meta name="description" content="Quality hardware and building materials in Tanzania. Cement, steel, roofing, plumbing, paint and tools at wholesale prices." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e2711d'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='white' font-family='Arial'>U</text></svg>" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a href="#home" class="logo" id="logo">Uzalendo Hardware</a>
      <nav class="nav" id="mainNav">
        <a href="#home" data-i18n="nav.home">Home</a>
        <a href="#about" data-i18n="nav.about">About</a>
        <a href="#products" data-i18n="nav.products">Products</a>
        <a href="#contact" data-i18n="nav.contact">Contact</a>
      </nav>
      <div class="header-actions">
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" data-lang="en" class="lang-btn active">EN</button>
          <button type="button" data-lang="sw" class="lang-btn">SW</button>
        </div>
        <a href="#contact" class="btn btn-whatsapp" id="headerWhatsApp" target="_blank" rel="noopener">
          <span class="wa-icon" aria-hidden="true"></span><span data-i18n="nav.chat">WhatsApp</span>
        </a>
        <button type="button" class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-overlay"></div>
      <div class="container hero-content">
        <h1 id="heroTitle"></h1>
        <p id="heroSubtitle"></p>
        <div class="hero-cta">
          <a href="#" class="btn btn-primary" id="heroWhatsApp" target="_blank" rel="noopener">
            <span class="wa-icon" aria-hidden="true"></span><span data-i18n="hero.chat">Chat on WhatsApp</span>
          </a>
          <a href="#" class="btn btn-outline" id="heroCall">
            <span data-i18n="hero.call">Call Us</span>
          </a>
        </div>
      </div>
    </section>

    <section class="section about" id="about">
      <div class="container">
        <h2 id="aboutTitle" class="section-title"></h2>
        <p id="aboutBody" class="section-lead"></p>
        <div class="highlights" id="highlights"></div>
      </div>
    </section>

    <section class="section products" id="products">
      <div class="container">
        <h2 id="productsTitle" class="section-title"></h2>
        <p id="productsSubtitle" class="section-lead"></p>
        <div class="filters" id="filters"></div>
        <div class="product-grid" id="productGrid"></div>
        <p class="empty-note" id="emptyNote" hidden></p>
      </div>
    </section>

    <section class="section contact" id="contact">
      <div class="container">
        <h2 id="contactTitle" class="section-title"></h2>
        <p id="contactSubtitle" class="section-lead"></p>
        <div class="contact-grid">
          <div class="contact-info">
            <ul class="contact-list" id="contactList"></ul>
            <div class="contact-buttons">
              <a href="#" class="btn btn-whatsapp" id="contactWhatsApp" target="_blank" rel="noopener">
                <span class="wa-icon" aria-hidden="true"></span><span data-i18n="hero.chat">Chat on WhatsApp</span>
              </a>
              <a href="#" class="btn btn-outline" id="contactCall"><span data-i18n="hero.call">Call Us</span></a>
            </div>
          </div>
          <div class="contact-map">
            <iframe id="mapFrame" title="Map" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span id="footerName"></span>
      <span class="footer-copy">&copy; <span id="year"></span> · <span data-i18n="footer.rights">All rights reserved</span></span>
    </div>
  </footer>

  <div class="modal" id="productModal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalName">
      <button type="button" class="modal-close" data-close aria-label="Close">&times;</button>
      <img id="modalImage" alt="" loading="lazy" />
      <div class="modal-body">
        <span class="modal-category" id="modalCategory"></span>
        <h3 id="modalName"></h3>
        <p id="modalDesc"></p>
        <dl class="modal-meta">
          <div id="modalSpecRow"><dt data-i18n="modal.spec">Specification</dt><dd id="modalSpec"></dd></div>
          <div id="modalPriceRow"><dt data-i18n="modal.price">Price</dt><dd id="modalPrice"></dd></div>
        </dl>
        <a href="#" class="btn btn-whatsapp btn-block" id="modalWhatsApp" target="_blank" rel="noopener">
          <span class="wa-icon" aria-hidden="true"></span><span data-i18n="modal.enquire">Enquire on WhatsApp</span>
        </a>
      </div>
    </div>
  </div>

  <a href="#" class="whatsapp-fab" id="fabWhatsApp" target="_blank" rel="noopener" aria-label="WhatsApp">
    <span class="wa-icon" aria-hidden="true"></span>
  </a>

  <script src="/assets/js/main.js"></script>
</body>
</html>
